    <circle cx="16" cy="59" r="4"/>
    <circle cx="26" cy="18" r="4"/>
    <circle cx="26" cy="72" r="4"/>
    <rect x="22" y="28" width="22" height="8" rx="4"/>
    <rect x="22" y="54" width="22" height="8" rx="4"/>
    <rect x="32" y="15" width="30" height="8" rx="4"/>
    <rect x="32" y="67" width="30" height="8" rx="4"/>
