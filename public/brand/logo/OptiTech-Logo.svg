<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 444 90" width="444" height="90" role="img" aria-labelledby="title desc">
  <title id="title">OptiTech full logo</title>
  <desc id="desc">OptiTech wordmark in Poppins with AI/data-stream icon, using only the OptiTech brand colors.</desc>
  <defs>
    <linearGradient id="ot-mark-gradient" x1="0" y1="45" x2="120" y2="45" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="oklch(82% 0.19 145)"/>
      <stop offset="0.52" stop-color="oklch(55% 0.18 195)"/>
      <stop offset="1" stop-color="oklch(55% 0.18 195)"/>
