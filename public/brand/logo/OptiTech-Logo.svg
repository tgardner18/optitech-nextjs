      <rect x="21" y="21" width="43" height="8" rx="4" fill="black"/>
      <rect x="29" y="34" width="38" height="8" rx="4" fill="black"/>
      <rect x="18" y="47" width="45" height="8" rx="4" fill="black"/>
      <rect x="29" y="60" width="36" height="8" rx="4" fill="black"/>
